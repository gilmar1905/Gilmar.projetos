<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Multi-Surebet Avançada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 500px; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-top: 10px; }
        h2 { text-align: center; margin-bottom: 20px; color: #00e676; font-size: 24px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #b0b0b0; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2d2d2d; color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: #00e676; }
        
        .odds-container { margin-top: 15px; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .odd-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; background: #252525; padding: 8px; border-radius: 8px; transition: 0.3s; }
        .odd-row span { font-size: 14px; color: #b0b0b0; min-width: 60px; }
        .radio-group { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #00e676; cursor: pointer; min-width: 50px; opacity: 0.5; transition: 0.3s; }
        .radio-group input { width: auto; margin-bottom: 3px; cursor: pointer; }
        
        .btn-calc { width: 100%; padding: 14px; background: #00e676; border: none; border-radius: 8px; color: #121212; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-calc:hover { background: #00c853; }
        
        .results { margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; display: none; }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2d2d2d; font-size: 15px; }
        .result-item span:last-child { font-weight: bold; }
        .lucro-positivo { color: #00e676; }
        .lucro-negativo { color: #ff5252; }
        .info-aposta { color: #ffffff; }
        .destaque-lucro { background: rgba(0, 230, 118, 0.15); padding: 5px; border-radius: 4px; border-left: 3px solid #00e676; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Multi-Surebet Avançada</h2>
    
    <div class="input-group">
        <label for="qtd_odds">Quantidade de Opções / Odds</label>
        <select id="qtd_odds"></select>
    </div>

    <div class="input-group">
        <label for="modo_calculo">Estratégia de Distribuição</label>
        <select id="modo_calculo">
            <option value="dividido">Dividir Lucro Igualmente (Surebet Tradicional)</option>
            <option value="protecao">Concentrar Lucro em 1 Opção (Com Proteção)</option>
        </select>
    </div>

    <div class="input-group">
        <label for="montante">Montante Total Disponível (R$)</label>
        <input type="number" id="montante" placeholder="Ex: 100" step="any">
    </div>

    <div id="texto_ajuda_radio" style="font-size: 13px; color: #00e676; margin-bottom: 5px; font-weight: bold; display: none;">
        Selecione qual opção deve puxar todo o lucro:
    </div>

    <div class="odds-container" id="lista_odds">
        </div>

    <button class="btn-calc" id="btn_calcular">Calcular Proporções</button>

    <div class="results" id="resultados">
        <div id="lista_resultados_apostas">
            </div>
        <hr style="border: 0; border-top: 1px dashed #333; margin: 10px 0;">
        <div id="resumo_final_container">
            </div>
    </div>
</div>

<script>
    const qtdOddsSelect = document.getElementById('qtd_odds');
    const modoCalculoSelect = document.getElementById('modo_calculo');
    const listaOddsContainer = document.getElementById('lista_odds');
    const btnCalcular = document.getElementById('btn_calcular');
    const resultadosContainer = document.getElementById('resultados');
    const listaResultadosApostas = document.getElementById('lista_resultados_apostas');
    const resumoFinalContainer = document.getElementById('resumo_final_container');
    const textoAjudaRadio = document.getElementById('texto_ajuda_radio');

    // Preenche o select de 2 até 20 opções
    for (let i = 2; i <= 20; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i + " Opções (Odds)";
        if(i === 2) opt.selected = true;
        qtdOddsSelect.appendChild(opt);
    }

    // Controla a visibilidade visual das bolinhas de lucro baseado no modo escolhido
    function gerenciarModoVisual() {
        const modo = modoCalculoSelect.value;
        const radios = document.querySelectorAll('.radio-group');
        
        if (modo === 'protecao') {
            textoAjudaRadio.style.display = 'block';
            radios.forEach(r => {
                r.style.opacity = '1';
                r.style.pointerEvents = 'auto';
            });
        } else {
            textoAjudaRadio.style.display = 'none';
            radios.forEach(r => {
                r.style.opacity = '0.2';
                r.style.pointerEvents = 'none'; // desativa cliques se estiver no modo dividido
            });
        }
        resultadosContainer.style.display = 'none';
    }

    // Gera as linhas de inputs dinamicamente
    function gerarInputsOdds() {
        listaOddsContainer.innerHTML = '';
        resultadosContainer.style.display = 'none';
        const qtd = parseInt(qtdOddsSelect.value);

        for (let i = 1; i <= qtd; i++) {
            const div = document.createElement('div');
            div.className = 'odd-row';
            const checked = (i === 1) ? 'checked' : '';
            
            div.innerHTML = `
                <span>Opção ${i}:</span>
                <input type="number" class="odd-input" id="odd_${i}" placeholder="Odd ${i}" step="any">
                <label class="radio-group">
                    <input type="radio" name="opcao_lucro" value="${i}" ${checked}>
                    Lucro
                </label>
            `;
            listaOddsContainer.appendChild(div);
        }
        gerenciarModoVisual();
    }

    gerarInputsOdds();
    qtdOddsSelect.addEventListener('change', gerarInputsOdds);
    modoCalculoSelect.addEventListener('change', gerenciarModoVisual);

    btnCalcular.addEventListener('click', function() {
        const total = parseFloat(document.getElementById('montante').value);
        if (isNaN(total) || total <= 0) {
            alert("Por favor, insira um montante total válido.");
            return;
        }

        const inputs = document.querySelectorAll('.odd-input');
        const modo = modoCalculoSelect.value;
        
        let odds = [];
        let somaInversos = 0;
        let o_lucro_alvo = 1;
        
        if (modo === 'protecao') {
            o_lucro_alvo = parseInt(document.querySelector('input[name="opcao_lucro"]:checked').value);
        }

        // Captura e validação geral das odds
        for (let i = 0; i < inputs.length; i++) {
            const valor = parseFloat(inputs[i].value);
            if (isNaN(valor) || valor <= 1) {
                alert(`Por favor, preencha a Odd da Opção ${i + 1} com um valor válido.`);
                return;
            }
            odds.push({ num: i + 1, valor: valor });
            somaInversos += (1 / valor);
        }

        listaResultadosApostas.innerHTML = '';
        resumoFinalContainer.innerHTML = '';
        let investimentos = {};

        if (modo === 'dividido') {
            // --- MODO 1: LUCRO DIVIDIDO IGUALMENTE (SUREBET CLÁSSICA) ---
            let retornoBrutoGeral = total / somaInversos;
            let lucroLiquidoGeral = retornoBrutoGeral - total;
            let lucroPercentGeral = (lucroLiquidoGeral / total) * 100;
            let classeLucro = lucroLiquidoGeral > 0 ? "lucro-positivo" : "lucro-negativo";

            odds.forEach(o => {
                let inv = retornoBrutoGeral / o.valor;
                const divRes = document.createElement('div');
                divRes.className = 'result-item';
                divRes.innerHTML = `<span>Investir na Opção ${o.num} (Odd ${o.valor.toFixed(2)}):</span> <span class="info-aposta">R$ ${inv.toFixed(2)}</span>`;
                listaResultadosApostas.appendChild(divRes);
            });

            resumoFinalContainer.innerHTML = `
                <div class="result-item" style="font-size: 16px;"><span>Retorno Bruto (Qualquer resultado):</span><span style="color:#fff;">R$ ${retornoBrutoGeral.toFixed(2)}</span></div>
                <div class="result-item" style="font-size: 18px;"><span>Lucro Líquido Garantido:</span><span class="${classeLucro}">R$ ${lucroLiquidoGeral.toFixed(2)} (${lucroPercentGeral.toFixed(2)}%)</span></div>
            `;

        } else {
            // --- MODO 2: CONCENTRAR LUCRO COM PROTEÇÃO ---
            let somaInversosProtecao = 0;
            odds.forEach(o => {
                if (o.num !== o_lucro_alvo) somaInversosProtecao += (1 / o.valor);
            });

            if (somaInversosProtecao >= 1) {
                alert("Erro: As odds de proteção consomem todo o montante. Lucro impossível.");
                return;
            }

            let montanteGastoProtecao = 0;
            odds.forEach(o => {
                if (o.num !== o_lucro_alvo) {
                    let invProt = total / o.valor;
                    investimentos[o.num] = invProt;
                    montanteGastoProtecao += invProt;
                }
            });

            let invPrincipal = total - montanteGastoProtecao;
            investimentos[o_lucro_alvo] = invPrincipal;

            if (invPrincipal <=
