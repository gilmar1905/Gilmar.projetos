<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Multi-Surebet</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 500px; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-top: 10px; }
        h2 { text-align: center; margin-bottom: 20px; color: #00e676; font-size: 24px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #b0b0b0; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2d2d2d; color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: #00e676; }
        
        .odds-container { margin-top: 15px; max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .odd-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .odd-row span { font-size: 14px; color: #b0b0b0; min-width: 65px; }
        
        .btn-calc { width: 100%; padding: 14px; background: #00e676; border: none; border-radius: 8px; color: #121212; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-calc:hover { background: #00c853; }
        
        .results { margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; display: none; }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2d2d2d; font-size: 15px; }
        .result-item span:last-child { font-weight: bold; }
        .lucro-positivo { color: #00e676; }
        .lucro-negativo { color: #ff5252; }
        .info-aposta { color: #ffffff; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Multi-Surebet Calculator</h2>
    
    <div class="input-group">
        <label for="qtd_odds">Quantidade de Opções / Odds</label>
        <select id="qtd_odds"></select>
    </div>

    <div class="input-group">
        <label for="montante">Montante Total Disponível (R$)</label>
        <input type="number" id="montante" placeholder="Ex: 100" step="any">
    </div>

    <div class="odds-container" id="lista_odds">
        </div>

    <button class="btn-calc" id="btn_calcular">Calcular Proporções</button>

    <div class="results" id="resultados">
        <div id="lista_resultados_apostas">
            </div>
        <hr style="border: 0; border-top: 1px dashed #333; margin: 10px 0;">
        <div class="result-item" style="font-size: 16px;"><span>Retorno Bruto Total:</span><span id="res_retorno" style="color: #fff;">R$ 0,00</span></div>
        <div class="result-item" style="font-size: 18px;"><span>Lucro Líquido:</span><span id="res_lucro">R$ 0,00</span></div>
    </div>
</div>

<script>
    const qtdOddsSelect = document.getElementById('qtd_odds');
    const listaOddsContainer = document.getElementById('lista_odds');
    const btnCalcular = document.getElementById('btn_calcular');
    const resultadosContainer = document.getElementById('resultados');
    const listaResultadosApostas = document.getElementById('lista_resultados_apostas');

    // Preenche o select dinamicamente de 2 até 20 opções
    for (let i = 2; i <= 20; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i + " Opções (Odds)";
        if(i === 2) opt.selected = true;
        qtdOddsSelect.appendChild(opt);
    }

    // Função que gera os inputs de Odds na tela baseada na quantidade escolhida
    function gerarInputsOdds() {
        listaOddsContainer.innerHTML = '';
        resultadosContainer.style.display = 'none';
        const qtd = parseInt(qtdOddsSelect.value);

        for (let i = 1; i <= qtd; i++) {
            const div = document.createElement('div');
            div.className = 'odd-row';
            div.innerHTML = `
                <span>Opção ${i}:</span>
                <input type="number" class="odd-input" id="odd_${i}" placeholder="Digite a Odd ${i}" step="any">
            `;
            listaOddsContainer.appendChild(div);
        }
    }

    // Inicializa com 2 campos na primeira execução
    gerarInputsOdds();

    // Atualiza os campos sempre que mudar a quantidade no select
    qtdOddsSelect.addEventListener('change', gerarInputsOdds);

    // Lógica do Cálculo Matemático Geral de Arbitragem (Surebet para N opções)
    btnCalcular.addEventListener('click', function() {
        const total = parseFloat(document.getElementById('montante').value);
        if (isNaN(total) || total <= 0) {
            alert("Por favor, insira um montante total válido.");
            return;
        }

        const inputs = document.querySelectorAll('.odd-input');
        let odds = [];
        let somaInversos = 0;

        // Captura e valida as odds digitadas
        for (let i = 0; i < inputs.length; i++) {
            const valor = parseFloat(inputs[i].value);
            if (isNaN(valor) || valor <= 1) {
                alert(`Por favor, preencha a Odd da Opção ${i + 1} com um valor válido maior que 1.`);
                return;
            }
            odds.push(valor);
            somaInversos += (1 / valor);
        }

        // Limpa resultados anteriores
        listaResultadosApostas.innerHTML = '';

        // Calcula a distribuição do dinheiro para cada opção
        // Fórmula básica: Investimento_i = Montante * ( (1/Odd_i) / Soma_De_Todos_Os_Inversos )
        let retornoEsperado = total / somaInversos;

        for (let i = 0; i < odds.length; i++) {
            let investimentoOpcao = retornoEsperado / odds[i];
            
            const divRes = document.createElement('div');
            divRes.className = 'result-item';
            divRes.innerHTML = `
                <span>Investir na Opção ${i + 1} (Odd ${odds[i].toFixed(2)}):</span>
                <span class="info-aposta">R$ ${investimentoOpcao.toFixed(2)}</span>
            `;
            listaResultadosApostas.appendChild(divRes);
        }

        // Calcula lucro ou prejuízo da operação
        const lucro = retornoEsperado - total;
        const lucroPercent = (lucro / total) * 100;

        document.getElementById('res_retorno').innerText = "R$ " + retornoEsperado.toFixed(2);
        
        const elementoLucro = document.getElementById('res_lucro');
        elementoLucro.innerText = "R$ " + lucro.toFixed(2) + " (" + lucroPercent.toFixed(2) + "%)";
        
        if (lucro > 0) {
            elementoLucro.className = "lucro-positivo";
        } else {
            elementoLucro.className = "lucro-negativo";
        }

        resultadosContainer.style.display = 'block';
    });
</script>
</body>
</html>
