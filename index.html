<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Multi-Surebet com Proteção</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 500px; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-top: 10px; }
        h2 { text-align: center; margin-bottom: 20px; color: #00e676; font-size: 24px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #b0b0b0; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2d2d2d; color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: #00e676; }
        
        .odds-container { margin-top: 15px; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .odd-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; background: #252525; padding: 8px; border-radius: 8px; }
        .odd-row span { font-size: 14px; color: #b0b0b0; min-width: 60px; }
        .radio-group { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #00e676; cursor: pointer; min-width: 50px; }
        .radio-group input { width: auto; margin-bottom: 3px; cursor: pointer; }
        
        .btn-calc { width: 100%; padding: 14px; background: #00e676; border: none; border-radius: 8px; color: #121212; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-calc:hover { background: #00c853; }
        
        .results { margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; display: none; }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2d2d2d; font-size: 15px; }
        .result-item span:last-child { font-weight: bold; }
        .lucro-positivo { color: #00e676; }
        .lucro-negativo { color: #ff5252; }
        .info-aposta { color: #ffffff; }
        .destaque-lucro { background: rgba(0, 230, 118, 0.1); padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Multi-Surebet Pro</h2>
    
    <div class="input-group">
        <label for="qtd_odds">Quantidade de Opções / Odds</label>
        <select id="qtd_odds"></select>
    </div>

    <div class="input-group">
        <label for="montante">Montante Total Disponível (R$)</label>
        <input type="number" id="montante" placeholder="Ex: 100" step="any">
    </div>

    <div style="font-size: 13px; color: #00e676; margin-bottom: 5px; font-weight: bold;">
        Selecione a opção principal para puxar todo o lucro:
    </div>

    <div class="odds-container" id="lista_odds">
        </div>

    <button class="btn-calc" id="btn_calcular">Calcular Proporções</button>

    <div class="results" id="resultados">
        <div id="lista_resultados_apostas">
            </div>
        <hr style="border: 0; border-top: 1px dashed #333; margin: 10px 0;">
        <div class="result-item" style="font-size: 16px;"><span>Se der a Opção Principal selecionada:</span><span id="res_lucro_principal" class="lucro-positivo">R$ 0,00</span></div>
        <div class="result-item" style="font-size: 15px; color: #b0b0b0;"><span>Se der qualquer outra opção (Proteção):</span><span>Retorna o Montante (R$ 0,00)</span></div>
    </div>
</div>

<script>
    const qtdOddsSelect = document.getElementById('qtd_odds');
    const listaOddsContainer = document.getElementById('lista_odds');
    const btnCalcular = document.getElementById('btn_calcular');
    const resultadosContainer = document.getElementById('resultados');
    const listaResultadosApostas = document.getElementById('lista_resultados_apostas');

    // Preenche o select de 2 até 20 opções
    for (let i = 2; i <= 20; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i + " Opções (Odds)";
        if(i === 2) opt.selected = true;
        qtdOddsSelect.appendChild(opt);
    }

    // Gera as linhas com Input + Radio Button para escolher o alvo do lucro
    function gerarInputsOdds() {
        listaOddsContainer.innerHTML = '';
        resultadosContainer.style.display = 'none';
        const qtd = parseInt(qtdOddsSelect.value);

        for (let i = 1; i <= qtd; i++) {
            const div = document.createElement('div');
            div.className = 'odd-row';
            
            // O primeiro radio button já vem marcado por padrão
            const checked = (i === 1) ? 'checked' : '';
            
            div.innerHTML = `
                <span>Opção ${i}:</span>
                <input type="number" class="odd-input" id="odd_${i}" placeholder="Odd ${i}" step="any">
                <label class="radio-group">
                    <input type="radio" name="opcao_lucro" value="${i}" ${checked}>
                    Lucro
                </label>
            `;
            listaOddsContainer.appendChild(div);
        }
    }

    gerarInputsOdds();
    qtdOddsSelect.addEventListener('change', gerarInputsOdds);

    btnCalcular.addEventListener('click', function() {
        const total = parseFloat(document.getElementById('montante').value);
        if (isNaN(total) || total <= 0) {
            alert("Por favor, insira um montante total válido.");
            return;
        }

        const inputs = document.querySelectorAll('.odd-input');
        const opcaoLucroAlvo = parseInt(document.querySelector('input[name="opcao_lucro"]:checked').value);
        
        let odds = {};
        let somaInversosProtecao = 0;

        // Captura e valida as odds
        for (let i = 0; i < inputs.length; i++) {
            const numOpcao = i + 1;
            const valor = parseFloat(inputs[i].value);
            if (isNaN(valor) || valor <= 1) {
                alert(`Por favor, preencha a Odd da Opção ${numOpcao} com um valor válido.`);
                return;
            }
            odds[numOpcao] = valor;

            // Soma o inverso apenas das opções de PROTEÇÃO (as que não foram selecionadas para o lucro)
            if (numOpcao !== opcaoLucroAlvo) {
                somaInversosProtecao += (1 / valor);
            }
        }

        // Validação matemática se a proteção não estoura o montante total
        if (somaInversosProtecao >= 1) {
            alert("Erro: As odds de proteção são muito baixas. Elas sozinhas consomem mais do que o seu montante total, impossibilitando o lucro na opção principal.");
            return;
        }

        listaResultadosApostas.innerHTML = '';
        let investimentos = {};
        let montanteGastoProtecao = 0;

        // 1º Passo: Calcula o valor exato para as opções de proteção retornarem exatamente o Montante Total
        for (let numOpcao in odds) {
            let n = parseInt(numOpcao);
            if (n !== opcaoLucroAlvo) {
                let invProtecao = total / odds[n];
                investimentos[n] = invProtecao;
                montanteGastoProtecao += invProtecao;
            }
        }

        // 2º Passo: O que sobrou do montante vai inteirinho para a opção principal (lucro alvo)
        let invPrincipal = total - montanteGastoProtecao;
        investimentos[opcaoLucroAlvo] = invPrincipal;

        // Se o valor restante for menor ou igual a 0, a surebet com proteção é inválida
        if (invPrincipal <= 0) {
            alert("Com essas odds, o custo para se proteger anula qualquer chance de investimento na opção principal.");
            return;
        }

        // Mostra a distribuição na tela
        for (let i = 1; i <= inputs.length; i++) {
            const divRes = document.createElement('div');
            divRes.className = 'result-item';
            
            // Destaca visualmente na lista qual é a opção principal escolhida
            if (i === opcaoLucroAlvo) {
                divRes.classList.add('destaque-lucro');
                divRes.innerHTML = `<span>⭐ Investir na Opção ${i} (Alvo de Lucro):</span> <span class="info-aposta">R$ ${investimentos[i].toFixed(2)}</span>`;
            } else {
                divRes.innerHTML = `<span>Investir na Opção ${i} (Proteção):</span> <span class="info-aposta">R$ ${investimentos[i].toFixed(2)}</span>`;
            }
            listaResultadosApostas.appendChild(divRes);
        }

        // 3º Passo: Calcula o retorno e lucro caso a opção principal seja a vencedora
        const retornoPrincipal = investimentos[opcaoLucroAlvo] * odds[opcaoLucroAlvo];
        const lucroLiquidoPrincipal = retornoPrincipal - total;
        const lucroPercentPrincipal = (lucroLiquidoPrincipal / total) * 100;

        // Atualiza o painel resumo final
        const painelLucro = document.getElementById('res_lucro_principal');
        painelLucro.innerText = `R$ ${retornoPrincipal.toFixed(2)} [Lucro de R$ ${lucroLiquidoPrincipal.toFixed(2)} (${lucroPercentPrincipal.toFixed(2)}%)]`;
        
        if (lucroLiquidoPrincipal > 0) {
            painelLucro.className = "lucro-positivo";
        } else {
            painelLucro.className = "lucro-negativo";
        }

        resultadosContainer.style.display = 'block';
    });
</script>
</body>
</html>
